# Codecov configuration for JEngine
# https://docs.codecov.com/docs/codecovyml-reference

coverage:
  status:
    project:
      default:
        # Floor at 85% so normal drift (a few hard-to-unit-test editor paths)
        # does not fail the check. Base project is ~95%, so there is plenty of
        # headroom without ratcheting it tighter on every PR.
        target: 85%
        threshold: 2%
    patch:
      default:
        # Same 85% floor for added/changed lines. Editor-window callbacks
        # (OnFocus, polling schedule) are not cleanly unit-testable, so we
        # accept a handful of uncovered lines per PR instead of chasing
        # auto-vs-base noise.
        target: 85%
        threshold: 2%
        # Informational: show the comment (so reviewers see where coverage
        # dropped) but never block the merge. The project check above still
        # guards against real regressions.
        informational: true

# Fix Docker container path prefix in coverage reports
# Unity test runner generates paths like /github/workspace/UnityProject/...
# This strips the /github/workspace/ prefix to match repository structure
fixes:
  - "/github/workspace/::"

# Flag management for per-package coverage tracking
flag_management:
  default_rules:
    # Prevents "unknown" coverage when only one package changes in a PR
    carryforward: true
  individual_flags:
    - name: util
      paths:
        - UnityProject/Packages/com.jasonxudeveloper.jengine.util/
      carryforward: true
    - name: ui
      paths:
        - UnityProject/Packages/com.jasonxudeveloper.jengine.ui/
      carryforward: true
    # Add future packages here as they become testable
    # - name: another-package
    #   paths:
    #     - UnityProject/Packages/com.jasonxudeveloper.another-package/
    #   carryforward: true

# Ignore files that shouldn't affect coverage
ignore:
  - "**/Samples/**"
  # Ignore third-party packages (not JEngine's)
  - "UnityProject/Packages/com.code-philosophy.*/**"
  - "UnityProject/Packages/com.unity.*/**"
  - "UnityProject/Packages/com.tuyoogame.*/**"
  - "UnityProject/Packages/com.focus-creative-games.*/**"

comment:
  layout: "reach,diff,flags,components"
  behavior: default
  require_changes: true
